<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <!-- УНИКАЛЬНЫЙ title -->
    <title>Ошибка 404 | Страница не найдена</title>

    <!-- УНИКАЛЬНОЕ описание -->
    <meta name="description" content="Страница не найдена. Вернитесь на главную страницу сайта.">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: 80px;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 25px;
            opacity: 0.9;
        }

        a {
            display: inline-block;
            padding: 12px 20px;
            background: white;
            color: #2c3e50;
            text-decoration: underline;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            background: #1abc9c;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <h2>Страница не найдена</h2>

    <p>
        К сожалению, запрашиваемая страница отсутствует или была удалена.
        Перейдите на главную страницу сайта.
    </p>

    <a href="index.html">Вернуться на главную</a>
</div>

</body>
</html>
